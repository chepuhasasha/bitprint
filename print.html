<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Конструктор этикеток PRO - Pixel Grid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bwip-js/3.3.0/bwip-js-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    body {
      background-color: #f3f4f6;
    }

    /* Рабочая область */
    #editor-workspace {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e2e8f0;
      padding: 40px;
      border-radius: 0.5rem;
      overflow: auto;
      min-height: 500px;
    }

    /* Холст - физическая матрица */
    #label-canvas {
      background: white;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: visible;
      transform: scale(3);
      transform-origin: center center;
      border: 1px solid #94a3b8;
      box-sizing: content-box;
      transition: width 0.3s, height 0.3s;
      image-rendering: pixelated;
    }

    /* Сетка 1x1 точка */
    .grid-background {
      background-image:
        linear-gradient(to right, #e2e8f0 1px, transparent 1px),
        linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
      background-size: 1px 1px;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      opacity: 0.5;
      z-index: 0;
    }

    .canvas-element {
      position: absolute;
      cursor: move;
      user-select: none;
      image-rendering: pixelated;
    }

    .canvas-element.selected {
      z-index: 10;
    }

    .selection-frame {
      position: absolute;
      outline: 1px solid rgba(0, 100, 255, 0.8);
      pointer-events: none;
      z-index: 15;
      box-sizing: border-box;
    }

    /* Маркеры управления */
    .ctrl-handle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border: 0.5px solid #0055ff;
      transform: translate(-50%, -50%);
      z-index: 20;
      pointer-events: auto;
      transition: background 0.1s;
    }

    .ctrl-handle:hover {
      background: #0055ff;
    }

    .resize-handle {
      cursor: nwse-resize;
    }

    .line-handle {
      cursor: crosshair;
    }

    #print-batch-container {
      display: none;
    }

    .print-label-box {
      box-sizing: border-box;
      position: relative;
      background: white;
      overflow: hidden;
      page-break-after: always;
      margin: 0;
      border: none;
      box-shadow: none;
    }

    @media print {
      body {
        background-color: white;
        margin: 0;
        padding: 0;
      }

      #ui-container,
      header {
        display: none !important;
      }

      #print-batch-container {
        display: block !important;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        box-sizing: border-box !important;
      }

      /* Заставляем принтер печатать пиксель-в-пиксель без сглаживания */
      canvas {
        image-rendering: -moz-crisp-edges;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }
    }
  </style>
</head>

<body class="text-gray-800 font-sans h-screen flex flex-col overflow-hidden">

            onchange="App.UI.updateSizeFromInput()" />
        </div>
      </div>

      <div class="flex items-center gap-2 border-l border-gray-300 pl-6">
        <button onclick="App.State.addElement('thermal_text')"

        <button onclick="App.State.addElement('text')"
          class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded border border-gray-300 transition">+
          Текст</button>
        <button onclick="App.State.addElement('code')"
          class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded border border-gray-300 transition">+
          Код</button>
        <button onclick="App.State.addElement('image')"
          class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded border border-gray-300 transition">+
          Карт</button>
        <button onclick="App.State.addElement('line')"
          class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded border border-gray-300 transition">+
          Линия</button>
      </div>

      <div class="flex items-center gap-2 border-l border-gray-300 pl-6">
        <button onclick="App.File.saveProject()"
          class="px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 text-sm font-medium rounded border border-green-200 transition">Сохранить</button>
        <button onclick="document.getElementById('projectFileInput').click()"
          class="px-3 py-1.5 bg-purple-50 hover:bg-purple-100 text-purple-700 text-sm font-medium rounded border border-purple-200 transition">Загрузить</button>
        <input type="file" id="projectFileInput" accept=".json" class="hidden" onchange="App.File.loadProject(event)" />
      </div>
    </div>

    <div class="flex items-center gap-4">

        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold text-sm shadow-sm transition">
        Матричная Печать

    </div>
  </header>

  <!-- === ОСНОВНОЙ ИНТЕРФЕЙС === -->
  <div id="ui-container" class="flex-1 flex overflow-hidden">

        class="block w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer mb-6"
        onchange="App.File.loadCSV(event)" />

      <div id="layers-list" class="space-y-1 overflow-y-auto flex-1"></div>
    </div>

      <div id="label-canvas">

      </div>
      <div id="canvas-size-indicator"

    </div>

    <!-- Панель свойств -->

      </div>
      <div id="properties-panel" class="p-4"></div>
    </div>
  </div>

      Utils: {
        uid: () => "el_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
        parseNumber(val, fallback = 0) {
          const n = Math.round(parseFloat(val));
          return isNaN(n) ? fallback : n;
        },
        getValue(el, csvRow = null) {
          if (el.dataSource === "static") return el.staticValue;
          if (el.dataSource === "dynamic") {
            const dataRow = csvRow || (App.State.csv.data.length > 1 ? App.State.csv.data[1] : null);
            if (dataRow) {
              const colIdx = parseInt(el.csvColumn);
              return dataRow[colIdx] ? String(dataRow[colIdx]).trim() : "";
            }
          }
          return "ДАННЫЕ";
        },
        normalizeGS1(text) {
          if (!text || !text.includes("(01)")) return text;
          let t = text.replace(/_x001D_|<GS>|\\x1d|\\x1D/g, "\x1D");
          if (/^01\d{14}21/.test(t)) {
            let res = `(01)${t.substring(2, 16)}(21)`;
            let parts = t.substring(18).split("\x1D");
            res += parts[0];
            for (let i = 1; i < parts.length; i++) {
              let p = parts[i];
              if (p.startsWith("91") || p.startsWith("92") || p.startsWith("93")) res += `(${p.substring(0, 2)})${p.substring(2)}`;
              else if (p.startsWith("3103")) res += `(3103)${p.substring(4)}`;
              else if (p.length > 2) res += `(${p.substring(0, 2)})${p.substring(2)}`;
              else res += p;
            }
            return res;
          }
          return text;
        }
      },

      Rasterizer: {
        applyThreshold(canvas) {
          const ctx = canvas.getContext('2d');
          const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imgData.data;
          for (let i = 0; i < data.length; i += 4) {
            if (data[i + 3] < 128) {
              data[i + 3] = 0;
            } else {
              const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;
              if (brightness < 128) {
                data[i] = data[i + 1] = data[i + 2] = 0;
                data[i + 3] = 255;
              } else {
                data[i + 3] = 0;
              }
            }
          }
          ctx.putImageData(imgData, 0, 0);
        },

        renderThermalText(el, text) {
          const canvas = document.createElement("canvas");
          canvas.width = el.width; canvas.height = el.height;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "black";

          const fScale = el.scale || 1;
          const lSpace = el.letterSpacing !== undefined ? el.letterSpacing : 1;

          const words = String(text).split(/(\s+)/);
          const lines = [];
          let currentLine = [];
          let currentWidth = 0;

          for (let word of words) {
            if (word === '\n') { lines.push(currentLine); currentLine = []; currentWidth = 0; continue; }

            let wordW = 0;
            for (let i = 0; i < word.length; i++) {
              const charMap = THERMAL_FONT.chars[word[i]] || THERMAL_FONT.chars[' '];
              let charW = 0;
              for(let r=0; r<charMap.length; r++) {
                 if(charMap[r].length > charW) charW = charMap[r].length;
              }
              wordW += (charW + lSpace) * fScale;
            }

            if (currentWidth + wordW > el.width && currentLine.length > 0) {
              if (word.trim() === '') continue;
              lines.push(currentLine);
              currentLine = [word];
              currentWidth = wordW;
            } else {
              currentLine.push(word);
              currentWidth += wordW;
            }
          }
          if (currentLine.length > 0) lines.push(currentLine);

          let currentY = 0;
          const lineHeight = (THERMAL_FONT.height + 1) * fScale;

          lines.forEach(lineArr => {
            const lineStr = lineArr.join('').trimEnd();
            let lineW = 0;
            const chars = [];
            
            for (let i = 0; i < lineStr.length; i++) {
              const map = THERMAL_FONT.chars[lineStr[i]] || THERMAL_FONT.chars[' '];
              let w = 0;
              for(let r=0; r<map.length; r++) {
                 if(map[r].length > w) w = map[r].length;
              }
              chars.push({ rows: map, w: w });
              lineW += (w + lSpace) * fScale;
            }
            if (lineW > 0) lineW -= lSpace * fScale;

            let currentX = 0;
            if (el.align === "center") currentX = Math.max(0, Math.floor((el.width - lineW) / 2));
            if (el.align === "right") currentX = Math.max(0, el.width - lineW);

            for (const char of chars) {
              for (let r = 0; r < THERMAL_FONT.height; r++) {
                const rowStr = char.rows[r] || "";
                for (let px = 0; px < char.w; px++) {
                  if (rowStr[px] === '#') {
                    ctx.fillRect(currentX + px * fScale, currentY + r * fScale, fScale, fScale);
                    if (el.bold) ctx.fillRect(currentX + px * fScale + 1, currentY + r * fScale, fScale, fScale);
                  }
                }
              }
              currentX += (char.w + lSpace) * fScale;
            }
            currentY += lineHeight;
          });
          return canvas;
        },

        renderSystemText(el, text) {
          const canvas = document.createElement("canvas");
          canvas.width = el.width; canvas.height = el.height;
          const ctx = canvas.getContext("2d", { willReadFrequently: true });

          ctx.fillStyle = "black";
          ctx.font = `${el.bold ? "bold" : "normal"} ${el.fontSize}px Arial, sans-serif`;
          ctx.textBaseline = "top";

          const lines = String(text).split('\n');
          const wrapped = [];

          lines.forEach(line => {
            const words = line.split(' ');
            let cur = '';
            words.forEach(w => {
              const test = cur + (cur ? ' ' : '') + w;
              if (ctx.measureText(test).width > el.width && cur !== '') {
                wrapped.push(cur); cur = w;
              } else { cur = test; }
            });
            if (cur) wrapped.push(cur);
          });

          let cY = 0;
          wrapped.forEach(line => {
            let cX = 0; const w = ctx.measureText(line).width;
            if (el.align === "center") cX = Math.floor((el.width - w) / 2);
            if (el.align === "right") cX = el.width - w;
            ctx.fillText(line, cX, cY);
            cY += el.fontSize + 2;
          });

          this.applyThreshold(canvas);
          return canvas;
        },

        renderBarcode(el, text) {
          const canvas = document.createElement("canvas");
          canvas.width = el.width; canvas.height = el.height;
          const ctx = canvas.getContext("2d");

          try {
            const bCanvas = document.createElement("canvas");
            const safeText = App.Utils.normalizeGS1(text);
            const is2D = ["gs1datamatrix", "datamatrix", "qrcode", "gs1qrcode"].includes(el.codeType);

            bwipjs.toCanvas(bCanvas, { bcid: el.codeType, text: safeText, scale: 1, includetext: !is2D, padding: 0 });

            let drawW, drawH;
            if (el.scaleMode === "stretch") {
              if (is2D) {
                const factor = Math.min(el.width / bCanvas.width, el.height / bCanvas.height);
                drawW = bCanvas.width * factor; drawH = bCanvas.height * factor;
              } else {
                drawW = el.width; drawH = el.height;
              }
            } else {
              if (is2D) {
                const scale = Math.max(1, Math.min(Math.floor(el.width / bCanvas.width), Math.floor(el.height / bCanvas.height)));
                drawW = bCanvas.width * scale; drawH = bCanvas.height * scale;
              } else {
                const scaleX = Math.max(1, Math.floor(el.width / bCanvas.width));
                drawW = bCanvas.width * scaleX; drawH = el.height;
              }
            }

            const offX = Math.floor((el.width - drawW) / 2);
            const offY = Math.floor((el.height - drawH) / 2);

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(bCanvas, 0, 0, bCanvas.width, bCanvas.height, offX, offY, drawW, drawH);

            if (el.scaleMode === "stretch") this.applyThreshold(canvas);
          } catch (e) { }
          return canvas;
        },

        renderLine(el, boxW, boxH, boxX, boxY) {
          const canvas = document.createElement("canvas");
          canvas.width = boxW; canvas.height = boxH;
          const ctx = canvas.getContext("2d");
          ctx.strokeStyle = "black"; ctx.lineWidth = el.thickness || 2; ctx.lineCap = "square";
          ctx.beginPath(); ctx.moveTo(el.x1 - boxX, el.y1 - boxY); ctx.lineTo(el.x2 - boxX, el.y2 - boxY); ctx.stroke();
          this.applyThreshold(canvas);
          return canvas;
        },

        renderImage(el, src) {
          return new Promise(resolve => {
            const canvas = document.createElement("canvas");
            canvas.width = el.width; canvas.height = el.height;
            if (!src) return resolve(canvas);

            const img = new Image();
            img.onload = () => {
              const ctx = canvas.getContext('2d', { willReadFrequently: true });
              ctx.drawImage(img, 0, 0, el.width, el.height);
              App.Rasterizer.applyThreshold(canvas);
              resolve(canvas);
            };
            img.onerror = () => resolve(canvas);
            img.src = src;
          });
        }
      },

      Events: {
        bindDrag(node, onStart, onMove, onEnd) {
          node.onmousedown = (e) => {
            if (["input", "select", "textarea", "button"].includes(e.target.tagName.toLowerCase())) return;
            e.stopPropagation(); e.preventDefault();

            if (onStart) onStart(e);

            const startX = e.clientX, startY = e.clientY;

            document.onmousemove = (ev) => {
              const dx = (ev.clientX - startX) / App.Config.CANVAS_SCALE;
              const dy = (ev.clientY - startY) / App.Config.CANVAS_SCALE;
              if (onMove) onMove(dx, dy);
            };

            document.onmouseup = () => {
              document.onmousemove = null; document.onmouseup = null;
              if (onEnd) onEnd();
            };
          };
        },

        initDraggableElement(node, el) {
          const iX = el.x, iY = el.y;
          const iX1 = el.x1, iY1 = el.y1, iX2 = el.x2, iY2 = el.y2;

          this.bindDrag(node,
            (e) => {
              if (App.State.selectedId !== el.id) {
                App.State.selectedId = el.id;
                App.UI.renderAll();
              }
            },
            (dx, dy) => {
              if (el.type === "line") {
                const sDx = Math.round(iX1 + dx) - iX1;
                const sDy = Math.round(iY1 + dy) - iY1;
                el.x1 = iX1 + sDx; el.y1 = iY1 + sDy;
                el.x2 = iX2 + sDx; el.y2 = iY2 + sDy;
              } else {
                el.x = Math.max(0, Math.min(Math.round(iX + dx), App.State.width - el.width));
                el.y = Math.max(0, Math.min(Math.round(iY + dy), App.State.height - el.height));
              }
              App.UI.updatePositionsOnly();
            },
            () => {
              App.UI.renderProperties();
            });
        },

        initResize(node, el) {
          const iW = el.width, iH = el.height;
          this.bindDrag(node, null, (dx, dy) => {
            el.width = Math.max(1, Math.round(iW + dx));
            el.height = Math.max(1, Math.round(iH + dy));
            App.UI.renderEditor();
          }, () => App.UI.renderProperties());
        },

        initLinePoint(node, el, pointIdx) {
          const iX = pointIdx === 1 ? el.x1 : el.x2;
          const iY = pointIdx === 1 ? el.y1 : el.y2;
          this.bindDrag(node, null, (dx, dy) => {
            const nx = Math.round(iX + dx), ny = Math.round(iY + dy);
            if (pointIdx === 1) { el.x1 = nx; el.y1 = ny; } else { el.x2 = nx; el.y2 = ny; }
            App.UI.renderEditor();
          }, () => App.UI.renderProperties());
        }
      },

      UI: {
        renderAll() {
          this.renderEditor();
          this.renderLayers();
          this.renderProperties();
        },

        updateSizeFromInput() {
          App.State.width = App.Utils.parseNumber(document.getElementById("labelWidthInput").value, 165);
          App.State.height = App.Utils.parseNumber(document.getElementById("labelHeightInput").value, 165);
          this.renderEditor();
        },

        updatePositionsOnly() {
          App.State.elements.forEach(el => {
            const node = document.getElementById(`node_${el.id}`);
            if (!node) return;
            let bX = el.x, bY = el.y;
            if (el.type === "line") {
              const pad = el.thickness || 2;
              bX = Math.min(el.x1, el.x2) - pad; bY = Math.min(el.y1, el.y2) - pad;
            }
            node.style.left = `${bX}px`; node.style.top = `${bY}px`;
          });

          const frame = document.getElementById("sel-frame");
          const rh = document.getElementById("sel-rh");
          const el = App.State.elements.find(e => e.id === App.State.selectedId);

          if (frame && el) {
            let bX = el.x, bY = el.y;
            if (el.type === "line") {
              const pad = el.thickness || 2;
              bX = Math.min(el.x1, el.x2) - pad; bY = Math.min(el.y1, el.y2) - pad;
              const p1 = document.getElementById("sel-p1"), p2 = document.getElementById("sel-p2");
              if (p1) { p1.style.left = `${el.x1}px`; p1.style.top = `${el.y1}px`; }
              if (p2) { p2.style.left = `${el.x2}px`; p2.style.top = `${el.y2}px`; }
            } else if (rh) {
              rh.style.left = `${el.x + el.width}px`; rh.style.top = `${el.y + el.height}px`;
            }
            frame.style.left = `${bX}px`; frame.style.top = `${bY}px`;
          }
        },

        renderEditor() {
          const w = App.State.width, h = App.State.height;
          const mmW = (w / App.Config.DOTS_PER_MM).toFixed(1);
          const mmH = (h / App.Config.DOTS_PER_MM).toFixed(1);

          const canvas = document.getElementById("label-canvas");
          canvas.style.width = `${w}px`; canvas.style.height = `${h}px`;
          document.getElementById("canvas-size-indicator").innerText = `Матрица: ${w} × ${h} точек (≈ ${mmW} × ${mmH} мм)`;

          let styleEl = document.getElementById("print-style");
          if (!styleEl) { styleEl = document.createElement("style"); styleEl.id = "print-style"; document.head.appendChild(styleEl); }
          styleEl.innerHTML = `@media print { @page { size: ${mmW}mm ${mmH}mm; margin: 0; } .print-label-box { width: ${mmW}mm !important; height: ${mmH}mm !important; transform-origin: top left; } .print-label-box canvas { width: 100% !important; height: 100% !important; image-rendering: pixelated; } }`;

          canvas.innerHTML = '<div class="grid-background"></div>';
          const contentL = document.createElement("div"); contentL.className = "absolute inset-0 overflow-hidden";
          const controlL = document.createElement("div"); controlL.className = "absolute inset-0 overflow-visible pointer-events-none";
          canvas.appendChild(contentL); canvas.appendChild(controlL);

          App.State.elements.forEach((el) => {
            const val = App.Utils.getValue(el);
            const node = document.createElement("div");
            node.id = `node_${el.id}`;
            node.className = `canvas-element ${el.id === App.State.selectedId ? 'selected' : ''}`;

            let bX = el.x, bY = el.y, bW = el.width, bH = el.height;
            if (el.type === "line") {
              const pad = el.thickness || 2;
              bX = Math.min(el.x1, el.x2) - pad; bY = Math.min(el.y1, el.y2) - pad;
              bW = Math.abs(el.x2 - el.x1) + pad * 2; bH = Math.abs(el.y2 - el.y1) + pad * 2;
            }
            node.style.left = `${bX}px`; node.style.top = `${bY}px`;
            node.style.width = `${bW}px`; node.style.height = `${bH}px`;

            if (el.type === "image") {
              App.Rasterizer.renderImage(el, val).then(c => { c.className = "w-full h-full block"; node.appendChild(c); });
            } else {
              let c;
              if (el.type === "thermal_text") c = App.Rasterizer.renderThermalText(el, val);
              else if (el.type === "text") c = App.Rasterizer.renderSystemText(el, val);
              else if (el.type === "code") c = App.Rasterizer.renderBarcode(el, val);
              else if (el.type === "line") c = App.Rasterizer.renderLine(el, bW, bH, bX, bY);
              if (c) { c.className = "w-full h-full block"; node.appendChild(c); }
            }

            App.Events.initDraggableElement(node, el);
            contentL.appendChild(node);

            if (el.id === App.State.selectedId) {
              const frame = document.createElement("div");
              frame.id = "sel-frame";
              frame.className = "selection-frame";
              frame.style.left = `${bX}px`; frame.style.top = `${bY}px`;
              frame.style.width = `${bW}px`; frame.style.height = `${bH}px`;
              controlL.appendChild(frame);

              if (el.type === "line") {
                const p1 = document.createElement("div"); p1.id = "sel-p1"; p1.className = "ctrl-handle line-handle"; p1.style.left = `${el.x1}px`; p1.style.top = `${el.y1}px`;
                const p2 = document.createElement("div"); p2.id = "sel-p2"; p2.className = "ctrl-handle line-handle"; p2.style.left = `${el.x2}px`; p2.style.top = `${el.y2}px`;
                App.Events.initLinePoint(p1, el, 1); App.Events.initLinePoint(p2, el, 2);
                controlL.appendChild(p1); controlL.appendChild(p2);
              } else {
                const rh = document.createElement("div");
                rh.id = "sel-rh"; rh.className = "ctrl-handle resize-handle";
                rh.style.left = `${el.x + el.width}px`; rh.style.top = `${el.y + el.height}px`;
                App.Events.initResize(rh, el);
                controlL.appendChild(rh);
              }
            }
          });
        },

        renderLayers() {
          const list = document.getElementById("layers-list");
          list.innerHTML = "";
          [...App.State.elements].reverse().forEach((el) => {
            const item = document.createElement("div");
            const isSel = el.id === App.State.selectedId;
            item.className = `p-2 text-xs rounded cursor-pointer flex justify-between items-center border ${isSel ? "bg-blue-50 border-blue-400 font-bold" : "bg-white border-gray-200 hover:bg-gray-50"}`;
            item.onclick = () => { App.State.selectedId = el.id; this.renderAll(); };

            const icons = { "text": "📝", "thermal_text": "🔠", "code": "🔳", "line": "➖", "image": "🖼️" };
            let label = el.type === "line" ? `Линия (${el.thickness}т)` : (el.dataSource === "static" ? el.staticValue : `[Колонка ${el.csvColumn}]`);
            if (label.length > 15) label = label.substring(0, 15) + "...";

            item.innerHTML = `<div class="flex items-center gap-2 truncate"><span>${icons[el.type] || '🔹'}</span><span class="truncate">${label}</span></div>
                                      <button class="text-red-500 hover:text-red-700 px-1" title="Удалить">✕</button>`;
            item.querySelector('button').onclick = (e) => { e.stopPropagation(); App.State.deleteElement(el.id); };
            list.appendChild(item);
          });
        },

        Builder: {
          field(label, key, val, type = "number", min = 0, step = 1, title = "") {
            return `<div><label class="text-xs text-gray-500" title="${title}">${label}:</label>
                            <input type="${type}" step="${step}" min="${min}" value="${val}" onchange="App.State.updateProp('${key}', this.value)" class="w-full px-2 py-1 border rounded text-sm font-mono"></div>`;
          },
          select(label, key, val, options) {
            const opts = options.map(o => `<option value="${o.v}" ${o.v === val ? 'selected' : ''}>${o.l}</option>`).join('');
            return `<div><label class="text-xs text-gray-500">${label}:</label>
                            <select onchange="App.State.updateProp('${key}', this.value)" class="w-full px-2 py-1 border rounded text-sm">${opts}</select></div>`;
          },
          text(label, key, val, rows = 2) {
            return `<div><label class="text-xs font-bold text-gray-700 mb-1 block">${label}</label>
                            <textarea rows="${rows}" oninput="App.State.updateProp('${key}', this.value)" class="w-full px-2 py-1 border border-gray-300 rounded text-sm font-mono">${val}</textarea></div>`;
          },
          block(title, content) {
            return `<div class="space-y-3 pb-4 border-b border-gray-200"><label class="block text-xs font-bold text-gray-700">${title}</label>${content}</div>`;
          }
        },

        renderProperties() {
          const p = document.getElementById("properties-panel");
          const el = App.State.elements.find((e) => e.id === App.State.selectedId);
          if (!el) { p.innerHTML = '<div class="text-sm text-gray-500 text-center mt-10">Выберите элемент</div>'; return; }

          const B = this.Builder;
          let html = "";

          if (el.type === "line") {
            html += B.block("Координаты линии (Точки)", `<div class="grid grid-cols-2 gap-2">${B.field("X1", "x1", el.x1)}${B.field("Y1", "y1", el.y1)}${B.field("X2", "x2", el.x2)}${B.field("Y2", "y2", el.y2)}</div>` + B.field("Толщина", "thickness", el.thickness));
          } else if (el.type === "image") {
            html += B.block("Изображение (1-bit)", `<input type="file" accept="image/*" onchange="App.File.loadImage(event)" class="w-full text-xs border border-gray-300 rounded p-1 bg-white">`);
          } else {
            const srcOpts = [{ v: "static", l: "Статичное" }, { v: "dynamic", l: "Из CSV" }];
            let dataInput = el.dataSource === "static" ? B.text("Значение", "staticValue", el.staticValue, el.type.includes('text') ? 2 : 1) : B.select("Колонка CSV", "csvColumn", el.csvColumn, App.State.csv.headers.map((h, i) => ({ v: i, l: `Колонка ${i + 1} (${h.substring(0, 10)})` })));
            html += B.block("Источник данных", B.select("Режим", "dataSource", el.dataSource, srcOpts) + dataInput);
          }

          if (el.type !== "line") {
            html += B.block("Геометрия (Точки)", `<div class="grid grid-cols-2 gap-2">${B.field("X", "x", el.x)}${B.field("Y", "y", el.y)}${B.field("Ширина", "width", el.width)}${B.field("Высота", "height", el.height)}</div>`);
          }

          if (el.type.includes("text")) {
            const alignOpts = [{ v: "left", l: "Влево" }, { v: "center", l: "Центр" }, { v: "right", l: "Вправо" }];
            const boldOpts = [{ v: "false", l: "Нет" }, { v: "true", l: "Да" }];
            let fontConfig = `<div class="flex gap-2">` +
              (el.type === "thermal_text" ? B.field("Масштаб", "scale", el.scale, "number", 1, 1, "Множитель матрицы 10x14") : B.field("Размер", "fontSize", el.fontSize)) +
              B.select("Жирный", "bold", el.bold, boldOpts) + `</div>`;

            if (el.type === "thermal_text") fontConfig += `<div class="flex gap-2 mt-2">${B.field("Отступ", "letterSpacing", el.letterSpacing)}${B.select("Выравнивание", "align", el.align, alignOpts)}</div>`;
            else fontConfig += `<div class="mt-2">${B.select("Выравнивание", "align", el.align, alignOpts)}</div>`;

            html += B.block(`Стиль текста ${el.type === 'thermal_text' ? '<span class="text-indigo-600">(Матрица 10x14 Точек)</span>' : ''}`, fontConfig);
          } else if (el.type === "code") {
            const codeOpts = [{ v: "gs1datamatrix", l: "GS1 DataMatrix (ЧЗ)" }, { v: "gs1qrcode", l: "GS1 QR" }, { v: "datamatrix", l: "Data Matrix" }, { v: "qrcode", l: "QR-код" }, { v: "ean13", l: "EAN-13" }, { v: "code128", l: "Code 128" }];
            const scaleOpts = [{ v: "integer", l: "Точное (Пиксель-в-пиксель)" }, { v: "stretch", l: "Растянуть" }];
            html += B.block("Штрихкод", B.select("Тип", "codeType", el.codeType, codeOpts) + `<div class="mt-2">` + B.select("Масштаб", "scaleMode", el.scaleMode, scaleOpts) + `</div>`);
          }

          p.innerHTML = html;
        }
      },

      File: {
        loadCSV(event) {
          const file = event.target.files[0];
          if (!file) return;
          Papa.parse(file, {
            header: false, skipEmptyLines: true,
            complete: (res) => {
              if (res.data.length > 0) {
                App.State.csv.data = res.data; App.State.csv.headers = res.data[0];
                App.UI.renderAll();
              }
            }
          });
        },
        loadImage(event) {
          const file = event.target.files[0];
          if (!file) return;
          const r = new FileReader();
          r.onload = (e) => { App.State.updateProp('staticValue', e.target.result); };
          r.readAsDataURL(file);
        },
        saveProject() {
          const data = { width: App.State.width, height: App.State.height, elements: App.State.elements };
          const link = document.createElement("a");
          link.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
          link.download = "pixel_label_" + Date.now() + ".json";
          link.click();
        },
        loadProject(event) {
          const file = event.target.files[0];
          if (!file) return;
          const r = new FileReader();
          r.onload = (e) => {
            try {
              const data = JSON.parse(e.target.result);
              if (data.width) document.getElementById("labelWidthInput").value = data.width;
              if (data.height) document.getElementById("labelHeightInput").value = data.height;
              if (data.elements) { App.State.elements = data.elements; App.State.selectedId = data.elements[0]?.id || null; }
              App.UI.updateSizeFromInput();
              event.target.value = "";
            } catch (err) { alert("Ошибка файла!"); }
          };
          r.readAsText(file);
        }
      },

      Print: {
        async executeBatch() {
          const btn = document.getElementById("printBtn");
          btn.innerHTML = "Генерация..."; btn.disabled = true;
          await new Promise(r => setTimeout(r, 50));

          const container = document.getElementById("print-batch-container");
          container.innerHTML = "";

          const rowCount = Math.max(1, App.State.csv.data.length - 1);

          for (let i = 0; i < rowCount; i++) {
            const csvRow = App.State.csv.data.length > 1 ? App.State.csv.data[i + 1] : null;

            const mCanvas = document.createElement('canvas');
            mCanvas.width = App.State.width; mCanvas.height = App.State.height;
            const ctx = mCanvas.getContext('2d');
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, mCanvas.width, mCanvas.height);

            for (const el of App.State.elements) {
              const val = App.Utils.getValue(el, csvRow);
              let c = null;
              let bX = el.x, bY = el.y;

              try {
                if (el.type === "line") {
                  const pad = el.thickness || 2;
                  bX = Math.min(el.x1, el.x2) - pad; bY = Math.min(el.y1, el.y2) - pad;
                  c = App.Rasterizer.renderLine(el, Math.abs(el.x2 - el.x1) + pad * 2, Math.abs(el.y2 - el.y1) + pad * 2, bX, bY);
                }
                else if (el.type === "thermal_text") c = App.Rasterizer.renderThermalText(el, val);
                else if (el.type === "text") c = App.Rasterizer.renderSystemText(el, val);
                else if (el.type === "code") c = App.Rasterizer.renderBarcode(el, val);
                else if (el.type === "image") c = await App.Rasterizer.renderImage(el, val);
              } catch (e) { console.warn("Skip render err:", e); }

              if (c) ctx.drawImage(c, bX, bY);
            }

            const page = document.createElement("div");
            page.className = "print-label-box";
            page.appendChild(mCanvas);
            container.appendChild(page);

            if (i > 0 && i % 50 === 0) {
              btn.innerHTML = `Генерация: ${i} / ${rowCount}`;
              await new Promise(r => setTimeout(r, 10));
            }
          }

          btn.innerHTML = "Матричная Печать"; btn.disabled = false;
          window.print();
        }
      },

      init() {
        this.State.initDefaults();
        this.UI.updateSizeFromInput();
        this.UI.renderLayers();
        this.UI.renderProperties();
      }
    };

    App.init();
  </script>
</body>
